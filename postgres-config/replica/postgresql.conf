# Replica PostgreSQL Configuration
# Оптимизированная конфигурация для чтения

# Connection settings
listen_addresses = '*'
max_connections = 200
superuser_reserved_connections = 3

# Memory Settings (для сервера с 16GB RAM)
shared_buffers = 4GB                # 25% от RAM
effective_cache_size = 12GB         # 75% от RAM
maintenance_work_mem = 1GB
work_mem = 256MB                    # Для сложных запросов
wal_buffers = 16MB
default_statistics_target = 100
random_page_cost = 1.1              # Для SSD

# Checkpoint Settings
min_wal_size = 1GB
max_wal_size = 4GB
checkpoint_completion_target = 0.9

# Parallel Query Execution
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# Replication Settings (REPLICA)
hot_standby = on
hot_standby_feedback = on
max_standby_streaming_delay = 30s
wal_receiver_timeout = 60s
max_logical_replication_workers = 4
max_sync_workers_per_subscription = 2

# Logging
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_min_duration_statement = 1000  # Log slow queries > 1s
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0

# Query Tuning
enable_partitionwise_join = on
enable_partitionwise_aggregate = on
jit = on

# Autovacuum tuning
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05