[databases]
; БД для чтения (через replica на внешнем сервере)
myapp_db = host=94.183.191.72 port=5432 dbname=myapp_db auth_user=myapp_user

[pgbouncer]
listen_addr = *
listen_port = 6432
auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt
admin_users = postgres, myapp_user
stats_users = stats, myapp_user

; Pool configuration for read operations
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 50
min_pool_size = 10
reserve_pool_size = 10
reserve_pool_timeout = 3
max_db_connections = 100
max_user_connections = 100

; Timeouts
server_reset_query = DISCARD ALL
server_reset_query_always = 0
server_check_query = select 1
server_check_delay = 30
query_timeout = 0
query_wait_timeout = 120
client_idle_timeout = 0
client_login_timeout = 60
idle_transaction_timeout = 0
server_lifetime = 3600
server_idle_timeout = 600
server_connect_timeout = 15
server_login_retry = 15
autodb_idle_timeout = 3600

; Logging
logfile = /var/log/pgbouncer/pgbouncer-read.log
pidfile = /var/run/pgbouncer/pgbouncer-read.pid
unix_socket_dir = /var/run/pgbouncer
unix_socket_mode = 0777

; Security
ignore_startup_parameters = extra_float_digits

; Performance
pkt_buf = 4096
max_packet_size = 2147483647
listen_backlog = 128
sbuf_loopcnt = 5
suspend_timeout = 10
tcp_defer_accept = 0
tcp_socket_buffer = 0